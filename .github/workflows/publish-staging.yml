name: Build and push staging site

on:
  push:
    branches: [develop]

permissions:
  contents: write

concurrency:
  group: staging-deployment
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          cat > .env.production <<'EOF'
          VITE_API_BASE=${{ secrets.VITE_API_BASE }}
          VITE_API_KEY=${{ secrets.VITE_API_KEY }}
          VITE_API_AUTHOR=${{ secrets.VITE_API_AUTHOR }}
          VITE_ENV=staging
          VITE_TURNSTILE_SITE_KEY_STG=${{ secrets.VITE_TURNSTILE_SITE_KEY_STG }}
          VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY_STG }}
          EOF

      - name: Build staging site
        run: npm run build

      - name: Publish dist to build-staging branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: build-staging
          PUBLISH_MESSAGE: "Staging build: ${{ github.sha }}"
        run: bash .github/scripts/publish-dist.sh
